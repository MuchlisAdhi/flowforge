name: FlowForge CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PHP_VERSION: '8.3'
  NODE_VERSION: '20'
  COMPOSER_NO_AUDIT: '1'

jobs:
  # =============================================
  # Backend: Identity Service
  # =============================================
  identity-service:
    name: Identity Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/identity-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_pgsql, redis, pcntl, zip
          tools: composer:v2.7

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-scripts
        env:
          COMPOSER_NO_AUDIT: '1'

      - name: Run linting
        run: vendor/bin/pint --test
        continue-on-error: true

      - name: Run unit tests
        run: vendor/bin/pest --testsuite=Unit
        env:
          JWT_SECRET: testing-jwt-secret
          APP_URL: http://localhost

  # =============================================
  # Backend: Workflow Service
  # =============================================
  workflow-service:
    name: Workflow Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/workflow-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_pgsql, redis, pcntl, zip
          tools: composer:v2.7

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-scripts
        env:
          COMPOSER_NO_AUDIT: '1'

      - name: Run linting
        run: vendor/bin/pint --test
        continue-on-error: true

      - name: Run unit tests
        run: vendor/bin/pest --testsuite=Unit
        env:
          JWT_SECRET: testing-jwt-secret

  # =============================================
  # Backend: Execution Service
  # =============================================
  execution-service:
    name: Execution Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/execution-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_pgsql, redis, pcntl, zip
          tools: composer:v2.7

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-scripts
        env:
          COMPOSER_NO_AUDIT: '1'

      - name: Run linting
        run: vendor/bin/pint --test
        continue-on-error: true

      - name: Run unit tests
        run: vendor/bin/pest --testsuite=Unit
        env:
          JWT_SECRET: testing-jwt-secret
          EXECUTION_GLOBAL_TIMEOUT: '300'

  # =============================================
  # Backend: AI Service
  # =============================================
  ai-service:
    name: AI Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_pgsql, redis, pcntl, zip
          tools: composer:v2.7

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-scripts
        env:
          COMPOSER_NO_AUDIT: '1'

      - name: Run linting
        run: vendor/bin/pint --test
        continue-on-error: true

      - name: Run unit tests
        run: vendor/bin/pest --testsuite=Unit
        env:
          AI_PROVIDER: mock
          JWT_SECRET: testing-jwt-secret

  # =============================================
  # Frontend
  # =============================================
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Run linting
        run: npm run lint
        continue-on-error: true

      - name: Run unit tests
        run: npm run test:run

      - name: Build
        run: npm run build

  # =============================================
  # Docker Build (validates all Dockerfiles)
  # =============================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [identity-service, workflow-service, execution-service, ai-service, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./services/api-gateway
          push: false
          tags: flowforge/api-gateway:${{ github.sha }}

      - name: Build Identity Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/identity-service
          push: false
          tags: flowforge/identity-service:${{ github.sha }}

      - name: Build Workflow Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/workflow-service
          push: false
          tags: flowforge/workflow-service:${{ github.sha }}

      - name: Build Execution Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/execution-service
          push: false
          tags: flowforge/execution-service:${{ github.sha }}

      - name: Build AI Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/ai-service
          push: false
          tags: flowforge/ai-service:${{ github.sha }}

      - name: Build Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./services/frontend
          push: false
          tags: flowforge/frontend:${{ github.sha }}
